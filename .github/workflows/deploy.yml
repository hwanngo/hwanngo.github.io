name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger CV rebuild
        env:
          RESUME_REPO_TOKEN: ${{ secrets.RESUME_REPO_TOKEN }}
        # Skip when this push was the bot-driven PDF refresh, to avoid a
        # site ↔ resume rebuild loop.
        if: ${{ env.RESUME_REPO_TOKEN != '' && !contains(github.event.head_commit.message, '[skip-resume-rebuild]') }}
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.RESUME_REPO_TOKEN }}
          repository: hwanngo/resume
          event-type: site-updated
